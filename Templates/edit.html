{% extends "base.html" %}

{% block title %}
Edit Todo | Todo App
{% endblock %}

{% block content %}

<h2 class="mb-4">Edit Todo</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">
            Title
        </label>

        <input
            type="text"
            name="title"
            class="form-control"
            value="{{ task.title }}"
            required
        >

    </div>

    <div class="mb-3">

        <label class="form-label">
            Description
        </label>

        <textarea
            name="description"
            class="form-control"
            rows="4"
            required
        >{{ task.description }}</textarea>

    </div>

    <div class="form-check mb-3">

        <input
            type="checkbox"
            class="form-check-input"
            id="status"
            name="status"

            {% if task.status %}
                checked
            {% endif %}

        >

        <label class="form-check-label" for="status">
            Completed
        </label>

    </div>

    <button type="submit" class="btn btn-primary">
        Update Todo
    </button>

    <a href="/home" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
