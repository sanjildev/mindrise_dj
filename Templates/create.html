{% extends "base.html" %}

{% block title %}
Create Todo | Todo App
{% endblock %}

{% block content %}

<h2 class="mb-4">Create New Todo</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Title</label>

        <input
            type="text"
            name="title"
            class="form-control"
            placeholder="Enter title"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>

        <textarea
            name="description"
            class="form-control"
            rows="4"
            placeholder="Enter description"
            required
        ></textarea>
    </div>

    <div class="mb-3 form-check">

        <input
            type="checkbox"
            name="status"
            class="form-check-input"
            id="status"
        >

        <label class="form-check-label" for="status">
            Completed
        </label>

    </div>

    <button type="submit" class="btn btn-success">
        Save Todo
    </button>

    <a href="/home" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
